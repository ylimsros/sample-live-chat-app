global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "app"
    static_configs:
      - targets: ["host.docker.internal:3001"]

  - job_name: "chat-application"
    static_configs:
      - targets: ["host.docker.internal:3002"]
    metrics_path: "/metrics"
    scrape_interval: 10s